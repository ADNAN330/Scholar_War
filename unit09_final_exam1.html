<style>
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#e85d3a;--accent2:#f0a500;--text:#e8e2d9;--muted:#888;--correct:#2ecc71;--wrong:#e74c3c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;font-weight:300;min-height:100vh;padding-bottom:80px;}
header{background:linear-gradient(135deg,#0a0510 0%,#0d0d0d 60%);border-bottom:2px solid var(--accent);padding:44px 24px 32px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'09';position:absolute;font-family:'Playfair Display',serif;font-size:220px;font-weight:900;color:rgba(232,93,58,0.05);top:-50px;left:50%;transform:translateX(-50%);pointer-events:none;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,52px);font-weight:900;letter-spacing:3px;color:#fff;position:relative;}
header h1 span{color:var(--accent);}
header p{margin-top:8px;color:var(--muted);font-size:13px;letter-spacing:4px;text-transform:uppercase;position:relative;}
#scorebar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px 8px;display:flex;justify-content:center;gap:32px;flex-wrap:wrap;font-size:12px;letter-spacing:2px;text-transform:uppercase;position:sticky;top:0;z-index:100;}
#scorebar span{color:var(--muted);}
#scorebar strong{font-size:18px;}
#progress-bar{width:100%;height:3px;background:var(--border);margin-top:8px;}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;width:0%;}
.section{max-width:860px;margin:40px auto 0;padding:0 20px;}
.section-title{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);border-left:3px solid var(--accent);padding-left:12px;margin-bottom:22px;font-weight:600;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:22px;margin-bottom:16px;transition:border-color .3s;}
.q-card.answered-correct{border-color:var(--correct);}
.q-card.answered-wrong{border-color:var(--wrong);}
.q-meta{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.q-text{font-size:15px;line-height:1.65;margin-bottom:16px;}
.q-text em{font-style:italic;color:var(--accent2);}
.options{display:flex;flex-direction:column;gap:9px;}
.opt-btn{background:transparent;border:1px solid var(--border);border-radius:4px;padding:11px 14px;color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:13px;text-align:left;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:11px;}
.opt-btn:hover:not(:disabled){background:rgba(232,93,58,0.08);border-color:var(--accent);}
.opt-letter{width:24px;height:24px;border-radius:50%;border:1px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;transition:all .2s;}
.opt-btn.correct{background:rgba(46,204,113,0.12);border-color:var(--correct);color:var(--correct);}
.opt-btn.correct .opt-letter{background:var(--correct);border-color:var(--correct);color:#000;}
.opt-btn.wrong{background:rgba(231,76,60,0.12);border-color:var(--wrong);color:var(--wrong);}
.opt-btn.wrong .opt-letter{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.opt-btn:disabled{cursor:default;}
.feedback{display:none;margin-top:12px;padding:11px 14px;border-radius:4px;font-size:13px;line-height:1.6;}
.feedback.show{display:block;}
.feedback.correct-fb{background:rgba(46,204,113,0.1);border-left:3px solid var(--correct);color:#a8e6c3;}
.feedback.wrong-fb{background:rgba(231,76,60,0.1);border-left:3px solid var(--wrong);color:#f0b0a8;}
#submit-btn{display:block;margin:50px auto 20px;background:var(--accent);color:#fff;border:none;padding:15px 56px;font-family:'Source Sans 3',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;font-weight:600;cursor:pointer;border-radius:3px;transition:all .2s;}
#submit-btn:hover{background:#c9441f;transform:translateY(-2px);}
#result-panel{display:none;max-width:560px;margin:40px auto;padding:0 20px;text-align:center;}

.result-box{background:var(--card);border:2px solid var(--accent);border-radius:8px;padding:40px;}
.result-grade{font-family:'Playfair Display',serif;font-size:80px;font-weight:900;line-height:1;}
.result-label{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:8px;}
.result-detail{margin-top:22px;font-size:15px;color:var(--muted);line-height:2;}
#restart-btn{margin-top:26px;background:transparent;border:1px solid var(--accent);color:var(--accent);padding:11px 36px;font-family:'Source Sans 3',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .2s;}
#restart-btn:hover{background:var(--accent);color:#fff;}
#tab-bar{max-width:860px;margin:30px auto 0;padding:0 20px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.passage-box{background:#111;border:1px solid #2a2a2a;border-left:3px solid var(--accent2);border-radius:6px;padding:24px 26px;margin-bottom:28px;font-size:14px;line-height:1.85;color:#c8c2b8;}
.passage-box h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--accent2);margin-bottom:14px;letter-spacing:1px;}
.passage-box h4{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin:18px 0 8px;font-weight:600;}
.passage-box p{margin-bottom:10px;}
.passage-box p:last-child{margin-bottom:0;}
.passage-toggle{background:transparent;border:1px solid var(--accent2);color:var(--accent2);font-family:'Source Sans 3',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:7px 18px;border-radius:3px;cursor:pointer;margin-bottom:18px;transition:all .2s;}
.passage-toggle:hover{background:var(--accent2);color:#000;}
.passage-content{display:none;}
.passage-content.open{display:block;}
.tab-btn{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px 18px;font-family:'Source Sans 3',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;font-weight:600;cursor:pointer;border-radius:4px;transition:all .2s;}
.tab-btn:hover{border-color:var(--accent);color:var(--accent2);}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
</style>

  {s:"READING — Pages 86-87 — Consumer Crazy (Reading Comprehension)",t:"Where was Louise's first stop last Saturday morning?",o:["A department store on New Bond Street","The shoe department in Selfridges, on Oxford Street","A boutique in Manhattan","A local supermarket"],a:1,passage:`<h3>Consumer Crazy — Pages 86–87</h3><h4>1 · The Extreme Shopper</h4><p>Last Saturday morning Louise Anderson was up early, ready to begin her usual weekend routine. First stop was the shoe department in Selfridges, in London's Oxford Street, then she moved on to other department stores and finally to the designer boutiques along New Bond Street.</p><p>When she arrived back in her flat she had three pairs of designer shoes and a matching handbag. She had also picked up two cashmere sweaters, a £200 pot of face cream and another £200 worth of make-up. 'Shopping is my reward to myself for working hard all week,' says 31-year-old Louise, who is single and childless. 'And buying shoes gives me such a high.'</p><p>In the last month, Louise has also bought eight designer bikinis and a set of black Gucci luggage. Louise admits that she doesn't even wear all her purchases. 'There is an entire wall of my bedroom which is covered in boxes of shoes, all carefully labelled,' she says. 'Sometimes I don't actually wear them to go out. I just put them on in my bedroom and admire them.'</p><p>Consumer psychologist Dr Paul Marsden encounters more and more women like Louise, who are 'addicted to shopping'. He believes that the lifestyle of modern women is to blame. 'Women today are time-poor. If they have busy careers, other parts of their lives are often not very satisfactory, but they want to feel good about themselves. Shopping is a quick-fix solution. It's a way of telling themselves that they matter and are important.'</p><h4>2 · The Extreme Minimalist</h4><p>Andrew Hyde is a technology mogul and successful entrepreneur who travels between New York City and Silicon Valley. Instead of a Manhattan apartment, he has chosen to be homeless — and has reduced his possessions to just 15 things.</p><p>So what made him sell everything? For Andrew it is all about freedom from the responsibility of possessions. Or as he puts it on his blog, 'Lack of choice helps, not hurts.'</p><p>Chris Yurista, a DJ and travel agent from Washington, DC, has also given up his apartment and reduced his possessions to a backpack full of designer clothes, a laptop and a bicycle. All his bills and letters arrive electronically and his record collection of 2,000 albums has been relocated onto an external hard drive. His only worry is that a hard drive crash or a problem with a server will cause him to lose all his digital possessions.</p>`},

  {s:"READING — Pages 86-87 — Consumer Crazy (Reading Comprehension)",t:"According to Louise, what does shopping represent for her?",o:["A way to save money for the future","Her reward to herself for working hard all week","A way to make new friends","Part of her job"],a:1},

  {s:"READING — Pages 92-93 — I Couldn't Live Without",t:"What does novelist Rachel Billington say she can't do without?",o:["Her bicycle","Her jewellery","Horror films","Her cats"],a:1,passage:`<h3>I Couldn't Live Without — Pages 92–93</h3><h4>Jewellery — Rachel Billington (Novelist)</h4><p>"I just couldn't do without my jewellery. The first thing I do when I wake up is put on a necklace. It makes me feel good on a grey morning. I just can't understand why some women save their jewellery for going out."</p><h4>Lemsip — Shyama Perera (Broadcaster and novelist)</h4><p>"They say it can help with colds and flu, but I think it can help with all sorts of problems. I use it for dealing with everything from insomnia to writer's block. The poet Andrew Motion drinks it too – so I'm in good company."</p><h4>Horror films — Alex Zane (TV presenter and DJ)</h4><p>"I love movies. When I was ten years old, while everyone else was out playing football, I was indoors watching films. These days, if I want to feel scared, I turn off all the lights and watch The Ring."</p><h4>Bicycle — Oliver Peyton (Restaurateur)</h4><p>"It's the fastest way around London – I completely rely on it. I don't have a lock so I never leave it anywhere it can be stolen. London is much more interesting when you see it as a cyclist."</p><h4>Spikes — Darren Campbell (100m Olympic gold medallist)</h4><p>"I can't do without my Reebok spikes. I've got big size 12 feet and these spikes are incredibly comfortable. I started wearing them last year and then became Olympic champion."</p><h4>Pavoni coffee machine — Justin Cartwright (Novelist)</h4><p>"I am addicted to coffee. My machine is eight years old. It's not an easy machine to use, but it still makes great coffee. I can't do without it. I even take it on holiday."</p><h4>My cats — Patrick Moore (Astronomer)</h4><p>"There are two things that I couldn't bear to live without: one is black and white and the other is dark brown and they both say 'meow'. I love all animals but I've always been a cat person and I've had these two for a long time. They're really special to me."</p>`},

let answered=0,correct=0,wrong=0;
const userAnswers={};

const CATS=[...new Set(Q.map(q=>q.s.split(' — ')[0]))];
let activeCat=CATS[0];

function buildTabs(){
  const tb=document.getElementById('tab-bar');
  tb.innerHTML=CATS.map(c=>`<button class="tab-btn${c===activeCat?' active':''}" onclick="switchTab('${c}')">${c}</button>`).join('');
}

function switchTab(cat){
  activeCat=cat;
  buildTabs();
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildQuiz(){
  const c=document.getElementById('quiz-container');
  c.innerHTML='';
  let sec='';
  Q.forEach((q,i)=>{
    const thisCat=q.s.split(' — ')[0];
    if(thisCat!==activeCat)return;
    if(q.s!==sec){
      sec=q.s;
      const sd=document.createElement('div');
      sd.className='section';
      sd.innerHTML=`<div class="section-title">${sec}</div>`;
      c.appendChild(sd);
    }
    const lastSec=c.lastElementChild;
    if(q.passage && !lastSec.querySelector('.passage-box')){
      const pb=document.createElement('div');
      pb.className='passage-box';
      pb.innerHTML=`<button class="passage-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ Hide Reading Text':'▼ Show Reading Text'">▼ Show Reading Text</button><div class="passage-content">${q.passage}</div>`;
      lastSec.appendChild(pb);
    }
    const card=document.createElement('div');
    card.className='q-card';
    card.id='card-'+i;
    const L=['A','B','C','D'];
    card.innerHTML=`<div class="q-meta">Q${i+1} of ${Q.length}</div>
      <div class="q-text">${q.t}</div>
      <div class="options" id="opts-${i}">
        ${q.o.map((o,j)=>`<button class="opt-btn" id="opt-${i}-${j}" onclick="pick(${i},${j})"><span class="opt-letter">${L[j]}</span>${o}</button>`).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>`;
    lastSec.appendChild(card);
  });
  document.getElementById('total-q').textContent=Q.length;
}

function pick(qi,oi){
  if(userAnswers[qi]!==undefined)return;
  userAnswers[qi]=oi;
  answered++;
  const q=Q[qi];
  const ok=oi===q.a;
  if(ok)correct++;else wrong++;
  document.querySelectorAll(`#opts-${qi} .opt-btn`).forEach(b=>b.disabled=true);
  document.getElementById(`opt-${qi}-${q.a}`).classList.add('correct');
  if(!ok)document.getElementById(`opt-${qi}-${oi}`).classList.add('wrong');
  document.getElementById('card-'+qi).classList.add(ok?'answered-correct':'answered-wrong');
  const fb=document.getElementById('fb-'+qi);
  fb.classList.add('show');
  if(ok){fb.classList.add('correct-fb');fb.textContent='✓ Correct!';}
  else{fb.classList.add('wrong-fb');fb.textContent='✗ Wrong. Correct answer: "'+q.o[q.a]+'"';}
  document.getElementById('answered-q').textContent=answered;
  document.getElementById('correct-q').textContent=correct;
  document.getElementById('wrong-q').textContent=wrong;
  document.getElementById('progress-fill').style.width=Math.round(answered/Q.length*100)+'%';
}

function showFinalResult(){
  const pct=Math.round(correct/Q.length*100);
  let grade,color;
  if(pct>=90){grade='A+';color='#2ecc71';}
  else if(pct>=80){grade='A';color='#27ae60';}
  else if(pct>=70){grade='B';color='#f0a500';}
  else if(pct>=60){grade='C';color='#e67e22';}
  else{grade='F';color='#e74c3c';}
  const rp=document.getElementById('result-panel');
  rp.classList.add('show');
  document.getElementById('result-percent').textContent=pct+'%';
  document.getElementById('result-percent').style.color=color;
  document.getElementById('result-detail').innerHTML=`Grade: <strong style="color:${color}">${grade}</strong><br>Correct: <strong style="color:var(--correct)">${correct}</strong> / ${Q.length}<br>Wrong: <strong style="color:var(--wrong)">${wrong}</strong><br>Unanswered: <strong>${Q.length-answered}</strong>`;
  rp.scrollIntoView({behavior:'smooth'});
  document.getElementById('submit-btn').style.display='none';
}

function restartQuiz(){
  answered=0;correct=0;wrong=0;
  Object.keys(userAnswers).forEach(k=>delete userAnswers[k]);
  ['answered-q','correct-q','wrong-q'].forEach(id=>document.getElementById(id).textContent=0);
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('submit-btn').style.display='block';
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildTabs();
buildQuiz();
</script>
