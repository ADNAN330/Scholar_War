<style>
:root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#e85d3a;--accent2:#f0a500;--text:#e8e2d9;--muted:#888;--correct:#2ecc71;--wrong:#e74c3c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;font-weight:300;min-height:100vh;padding-bottom:80px;}
header{background:linear-gradient(135deg,#1a0a05 0%,#0d0d0d 60%);border-bottom:2px solid var(--accent);padding:44px 24px 32px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'06';position:absolute;font-family:'Playfair Display',serif;font-size:220px;font-weight:900;color:rgba(232,93,58,0.05);top:-50px;left:50%;transform:translateX(-50%);pointer-events:none;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,52px);font-weight:900;letter-spacing:3px;color:#fff;position:relative;}
header h1 span{color:var(--accent);}
header p{margin-top:8px;color:var(--muted);font-size:13px;letter-spacing:4px;text-transform:uppercase;position:relative;}
#scorebar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px 8px;display:flex;justify-content:center;gap:32px;flex-wrap:wrap;font-size:12px;letter-spacing:2px;text-transform:uppercase;position:sticky;top:0;z-index:100;}
#scorebar span{color:var(--muted);}
#scorebar strong{font-size:18px;}
#progress-bar{width:100%;height:3px;background:var(--border);margin-top:8px;}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;width:0%;}
.section{max-width:860px;margin:40px auto 0;padding:0 20px;}
.section-title{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);border-left:3px solid var(--accent);padding-left:12px;margin-bottom:22px;font-weight:600;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:22px;margin-bottom:16px;transition:border-color .3s;}
.q-card.answered-correct{border-color:var(--correct);}
.q-card.answered-wrong{border-color:var(--wrong);}
.q-meta{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.q-text{font-size:15px;line-height:1.65;margin-bottom:16px;}
.q-text em{font-style:italic;color:var(--accent2);}
.options{display:flex;flex-direction:column;gap:9px;}
.opt-btn{background:transparent;border:1px solid var(--border);border-radius:4px;padding:11px 14px;color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:13px;text-align:left;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:11px;}
.opt-btn:hover:not(:disabled){background:rgba(232,93,58,0.08);border-color:var(--accent);}
.opt-letter{width:24px;height:24px;border-radius:50%;border:1px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;transition:all .2s;}
.opt-btn.correct{background:rgba(46,204,113,0.12);border-color:var(--correct);color:var(--correct);}
.opt-btn.correct .opt-letter{background:var(--correct);border-color:var(--correct);color:#000;}
.opt-btn.wrong{background:rgba(231,76,60,0.12);border-color:var(--wrong);color:var(--wrong);}
.opt-btn.wrong .opt-letter{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.opt-btn:disabled{cursor:default;}
.feedback{display:none;margin-top:12px;padding:11px 14px;border-radius:4px;font-size:13px;line-height:1.6;}
.feedback.show{display:block;}
.feedback.correct-fb{background:rgba(46,204,113,0.1);border-left:3px solid var(--correct);color:#a8e6c3;}
.feedback.wrong-fb{background:rgba(231,76,60,0.1);border-left:3px solid var(--wrong);color:#f0b0a8;}
#submit-btn{display:block;margin:50px auto 20px;background:var(--accent);color:#fff;border:none;padding:15px 56px;font-family:'Source Sans 3',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;font-weight:600;cursor:pointer;border-radius:3px;transition:all .2s;}
#submit-btn:hover{background:#c9441f;transform:translateY(-2px);}
#result-panel{display:none;max-width:560px;margin:40px auto;padding:0 20px;text-align:center;}
#result-panel.show{display:block;}
.result-box{background:var(--card);border:2px solid var(--accent);border-radius:8px;padding:40px;}
.result-grade{font-family:'Playfair Display',serif;font-size:80px;font-weight:900;line-height:1;}
.result-label{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:8px;}
.result-detail{margin-top:22px;font-size:15px;color:var(--muted);line-height:2;}
#restart-btn{margin-top:26px;background:transparent;border:1px solid var(--accent);color:var(--accent);padding:11px 36px;font-family:'Source Sans 3',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .2s;}
#restart-btn:hover{background:var(--accent);color:#fff;}
</style>

let answered=0,correct=0,wrong=0;
const userAnswers={};

function buildQuiz(){
  const c=document.getElementById('quiz-container');
  c.innerHTML='';
  let sec='';
  Q.forEach((q,i)=>{
    if(q.s!==sec){
      sec=q.s;
      const sd=document.createElement('div');
      sd.className='section';
      sd.innerHTML=`<div class="section-title">${sec}</div>`;
      c.appendChild(sd);
    }
    const lastSec=c.lastElementChild;
    const card=document.createElement('div');
    card.className='q-card';
    card.id='card-'+i;
    const L=['A','B','C','D'];
    card.innerHTML=`<div class="q-meta">Q${i+1} of ${Q.length}</div>
      <div class="q-text">${q.t}</div>
      <div class="options" id="opts-${i}">
        ${q.o.map((o,j)=>`<button class="opt-btn" id="opt-${i}-${j}" onclick="pick(${i},${j})"><span class="opt-letter">${L[j]}</span>${o}</button>`).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>`;
    lastSec.appendChild(card);
  });
  document.getElementById('total-q').textContent=Q.length;
}

function pick(qi,oi){
  if(userAnswers[qi]!==undefined)return;
  userAnswers[qi]=oi;
  answered++;
  const q=Q[qi];
  const ok=oi===q.a;
  if(ok)correct++;else wrong++;
  document.querySelectorAll(`#opts-${qi} .opt-btn`).forEach(b=>b.disabled=true);
  document.getElementById(`opt-${qi}-${q.a}`).classList.add('correct');
  if(!ok)document.getElementById(`opt-${qi}-${oi}`).classList.add('wrong');
  document.getElementById('card-'+qi).classList.add(ok?'answered-correct':'answered-wrong');
  const fb=document.getElementById('fb-'+qi);
  fb.classList.add('show');
  if(ok){fb.classList.add('correct-fb');fb.textContent='✓ Correct!';}
  else{fb.classList.add('wrong-fb');fb.textContent='✗ Wrong. Correct answer: "'+q.o[q.a]+'"';}
  document.getElementById('answered-q').textContent=answered;
  document.getElementById('correct-q').textContent=correct;
  document.getElementById('wrong-q').textContent=wrong;
  document.getElementById('progress-fill').style.width=Math.round(answered/Q.length*100)+'%';
}

function showFinalResult(){
  const pct=Math.round(correct/Q.length*100);
  let grade,color;
  if(pct>=90){grade='A+';color='#2ecc71';}
  else if(pct>=80){grade='A';color='#27ae60';}
  else if(pct>=70){grade='B';color='#f0a500';}
  else if(pct>=60){grade='C';color='#e67e22';}
  else{grade='F';color='#e74c3c';}
  const rp=document.getElementById('result-panel');
  rp.classList.add('show');
  document.getElementById('result-percent').textContent=pct+'%';
  document.getElementById('result-percent').style.color=color;
  document.getElementById('result-detail').innerHTML=`Grade: <strong style="color:${color}">${grade}</strong><br>Correct: <strong style="color:var(--correct)">${correct}</strong> / ${Q.length}<br>Wrong: <strong style="color:var(--wrong)">${wrong}</strong><br>Unanswered: <strong>${Q.length-answered}</strong>`;
  rp.scrollIntoView({behavior:'smooth'});
  document.getElementById('submit-btn').style.display='none';
}

function restartQuiz(){
  answered=0;correct=0;wrong=0;
  Object.keys(userAnswers).forEach(k=>delete userAnswers[k]);
  ['answered-q','correct-q','wrong-q'].forEach(id=>document.getElementById(id).textContent=0);
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('submit-btn').style.display='block';
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildQuiz();
</script>
</body>
</html>
